<svg xmlns="http://www.w3.org/2000/svg" width="440" height="280" viewBox="0 0 440 280" role="img" aria-labelledby="title desc">
  <title id="title">Threads to Obsidian Chrome Web Store small promo tile</title>
  <desc id="desc">A beige promotional tile showing the product name and a simplified save card for saving Threads posts as Markdown.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7f0e7"/>
      <stop offset="100%" stop-color="#efe3d2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#3c2a17" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="440" height="280" fill="url(#bg)"/>
  <circle cx="396" cy="34" r="86" fill="#ead2b9"/>
  <circle cx="24" cy="258" r="90" fill="#f1e5d6"/>

  <g transform="translate(30 34)">
    <rect x="0" y="0" width="154" height="30" rx="15" fill="#fff8f1" stroke="#d8bc97"/>
    <circle cx="18" cy="15" r="7" fill="#aa5405"/>
    <text x="34" y="20" font-family="Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#8a4507">THREADS TO OBSIDIAN</text>

    <text x="0" y="86" font-family="Helvetica, Arial, sans-serif" font-size="35" font-weight="800" fill="#201710">Save posts</text>
    <text x="0" y="124" font-family="Helvetica, Arial, sans-serif" font-size="35" font-weight="800" fill="#201710">as Markdown</text>
    <text x="0" y="154" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#6d6358">Direct save + ZIP fallback</text>

    <g transform="translate(0 182)">
      <circle cx="8" cy="8" r="8" fill="#aa5405"/>
      <text x="24" y="13" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#4d4033">Threads post</text>
      <circle cx="8" cy="38" r="8" fill="#aa5405"/>
      <text x="24" y="43" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#4d4033">Images + replies</text>
    </g>
  </g>

  <g transform="translate(272 34)" filter="url(#shadow)">
    <rect x="0" y="0" width="138" height="196" rx="24" fill="#fffaf4" stroke="#d5b894" stroke-width="2"/>
    <text x="18" y="28" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#b05f16">CURRENT POST</text>

    <rect x="18" y="46" width="102" height="60" rx="14" fill="#f4eadf" stroke="#e0c29a"/>
    <rect x="30" y="61" width="58" height="10" rx="5" fill="#cfb18f"/>
    <rect x="30" y="79" width="74" height="8" rx="4" fill="#dbc5ac"/>
    <rect x="30" y="93" width="56" height="8" rx="4" fill="#dbc5ac"/>

    <rect x="18" y="122" width="102" height="48" rx="14" fill="#fff2e4" stroke="#e0c29a"/>
    <path d="M35 151h30l12-12h28" fill="none" stroke="#6d6358" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="74" y="178" width="56" height="30" rx="15" fill="#aa5405"/>
    <text x="102" y="197" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="800" fill="#fff8f1">SAVE</text>
  </g>
</svg>
