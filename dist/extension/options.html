<!doctype html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Threads to Obsidian</title>
  <link rel="stylesheet" href="./options.css" />
</head>

<body>
  <main class="page">
    <header class="hero">
      <div class="hero-top">
        <p class="eyebrow">Options</p>
        <div id="language-switch" class="language-switch" role="group">
          <button class="lang-button" data-locale="ko" type="button">한국어</button>
          <button class="lang-button" data-locale="en" type="button">English</button>
        </div>
      </div>
      <h1 id="options-title"></h1>
      <p id="options-subtitle"></p>
    </header>

    <section id="plan-spotlight" class="plan-spotlight">
      <div class="plan-spotlight-head">
        <span id="plan-spotlight-badge" class="plan-spotlight-badge">Free</span>
        <strong id="plan-spotlight-title"></strong>
      </div>
      <p id="plan-spotlight-copy" class="section-copy"></p>
      <p id="plan-spotlight-meta" class="detail-copy hidden"></p>
    </section>

    <form id="options-form" class="panel">
      <section class="ad-slot" aria-label="Ad placeholder">
        <span class="ad-slot-label" id="ad-slot-label"></span>
        <strong id="ad-slot-title"></strong>
        <p id="ad-slot-copy"></p>
      </section>

      <section class="subsection">
        <h2 id="folder-section-title"></h2>
        <p id="folder-status" class="section-copy"></p>
        <div class="folder-meta">
          <span class="meta-label" id="folder-path-label"></span>
          <strong id="folder-path-preview" class="path-value"></strong>
        </div>
        <p id="folder-path-hint" class="detail-copy folder-path-hint"></p>
        <div class="action-row">
          <button id="connect-folder" class="action-button" type="button"></button>
          <button id="disconnect-folder" class="ghost-button hidden" type="button"></button>
        </div>
      </section>

      <section class="subsection">
        <h2 id="basic-section-title"></h2>

        <label class="checkbox">
          <input id="include-images" name="includeImages" type="checkbox" />
          <span id="images-label"></span>
        </label>
      </section>

      <section class="subsection">
        <h2 id="compare-section-title"></h2>
        <table class="compare-table">
          <thead>
            <tr>
              <th></th>
              <th id="compare-free-label"></th>
              <th id="compare-pro-label"></th>
            </tr>
          </thead>
          <tbody>
            <tr><td id="cmp-save"></td><td class="cmp-check">✓</td><td class="cmp-check">✓</td></tr>
            <tr><td id="cmp-images"></td><td class="cmp-check">✓</td><td class="cmp-check">✓</td></tr>
            <tr><td id="cmp-replies"></td><td class="cmp-check">✓</td><td class="cmp-check">✓</td></tr>
            <tr><td id="cmp-dupes"></td><td class="cmp-check">✓</td><td class="cmp-check">✓</td></tr>
            <tr><td id="cmp-filename"></td><td class="cmp-dash">—</td><td class="cmp-check">✓</td></tr>
            <tr><td id="cmp-folder"></td><td class="cmp-dash">—</td><td class="cmp-check">✓</td></tr>
            <tr><td id="cmp-ai-summary"></td><td class="cmp-dash">—</td><td class="cmp-check">✓</td></tr>
            <tr><td id="cmp-ai-tags"></td><td class="cmp-dash">—</td><td class="cmp-check">✓</td></tr>
            <tr><td id="cmp-ai-frontmatter"></td><td class="cmp-dash">—</td><td class="cmp-check">✓</td></tr>
          </tbody>
        </table>
      </section>

      <details id="pro-panel" class="subsection pro-panel">
        <summary class="pro-summary">
          <div class="pro-summary-top">
            <div class="pro-summary-title-group">
              <h2 id="pro-section-title"></h2>
              <span id="pro-plan-badge" class="plan-badge">Free</span>
            </div>
            <span class="pro-summary-icon" aria-hidden="true"></span>
          </div>
          <p id="pro-section-subtitle" class="section-copy"></p>
          <p id="pro-ai-note" class="detail-copy pro-ai-note"></p>
          <p id="pro-status" class="section-copy pro-status-copy"></p>
          <p id="pro-license-meta" class="detail-copy hidden"></p>
        </summary>

        <div class="pro-panel-body">
          <a
            id="pro-sales-link"
            class="link-button"
            href="https://www.oxcorp.ninja/"
            target="_blank"
            rel="noreferrer"
          ></a>

          <label class="field">
            <span class="field-head">
              <span id="pro-key-label"></span>
            </span>
            <input id="pro-license-key" name="proLicenseKey" type="text" autocomplete="off" spellcheck="false" />
            <small id="pro-key-hint"></small>
          </label>

          <div class="action-row">
            <button id="activate-pro" class="action-button" type="button"></button>
            <button id="clear-pro" class="ghost-button hidden" type="button"></button>
          </div>

          <p id="pro-local-note" class="status"></p>

          <div class="pro-block">
            <h3 id="file-rules-title"></h3>

            <label class="field">
              <span class="field-head">
                <span id="pattern-label"></span>
                <span class="field-pill">Pro</span>
              </span>
              <input id="filename-pattern" name="filenamePattern" type="text" />
              <small id="tokens-hint"></small>
              <small id="pattern-lock-hint" class="field-note"></small>
            </label>

            <label class="field">
              <span class="field-head">
                <span id="save-path-pattern-label"></span>
                <span class="field-pill">Pro</span>
              </span>
              <input id="save-path-pattern" name="savePathPattern" type="text" />
              <small id="save-path-tokens-hint"></small>
              <small id="save-path-lock-hint" class="field-note"></small>
            </label>
          </div>

          <div class="pro-block">
            <h3 id="ai-section-title"></h3>
            <p id="ai-section-subtitle" class="section-copy"></p>
            <p id="ai-quickstart" class="detail-copy ai-quickstart"></p>

            <label class="checkbox">
              <input id="ai-enabled" name="aiEnabled" type="checkbox" />
              <span id="ai-enabled-label"></span>
            </label>

            <label class="field">
              <span class="field-head">
                <span id="ai-provider-label"></span>
                <span class="field-pill">Pro</span>
              </span>
              <select id="ai-provider" name="aiProvider"></select>
              <small id="ai-provider-hint"></small>
            </label>

            <label class="field">
              <span class="field-head">
                <span id="ai-api-key-label"></span>
                <span class="field-pill">Pro</span>
              </span>
              <input id="ai-api-key" name="aiApiKey" type="password" autocomplete="off" spellcheck="false" />
              <small id="ai-api-key-hint"></small>
            </label>

            <details class="ai-advanced-panel">
              <summary id="ai-advanced-summary"></summary>

              <label class="field">
                <span class="field-head">
                  <span id="ai-base-url-label"></span>
                  <span class="field-pill">Pro</span>
                </span>
                <input id="ai-base-url" name="aiBaseUrl" type="text" autocomplete="off" spellcheck="false" />
                <small id="ai-base-url-hint"></small>
              </label>

              <label class="field">
                <span class="field-head">
                  <span id="ai-model-label"></span>
                  <span class="field-pill">Pro</span>
                </span>
                <input id="ai-model" name="aiModel" type="text" autocomplete="off" spellcheck="false" />
                <small id="ai-model-hint"></small>
              </label>

              <label class="field">
                <span class="field-head">
                  <span id="ai-prompt-label"></span>
                  <span class="field-pill">Pro</span>
                </span>
                <textarea id="ai-prompt" name="aiPrompt" rows="5" spellcheck="false"></textarea>
                <small id="ai-prompt-hint"></small>
                <small id="ai-lock-hint" class="field-note"></small>
              </label>
            </details>
          </div>
        </div>
      </details>

      <section class="subsection subsection-save">
        <div class="field">
          <button id="submit-btn" class="save-button" type="submit"></button>
        </div>
      </section>
      <p id="save-status" class="status"></p>
    </form>
  </main>

  <script type="module" src="./options.js"></script>
</body>

</html>
