<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ss-threads</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="shell">
      <header class="header">
        <div class="header-top">
          <div>
            <p class="eyebrow">ss-threads</p>
            <h1 id="header-title">현재 글 저장</h1>
          </div>
          <div class="header-actions">
            <div id="language-switch" class="language-switch">
              <span class="language-icon" aria-hidden="true">
                <svg viewBox="0 0 20 20" fill="none">
                  <path d="M10 2.25a7.75 7.75 0 1 0 0 15.5a7.75 7.75 0 0 0 0-15.5Z" stroke="currentColor" stroke-width="1.25"/>
                  <path d="M2.75 10h14.5M10 2.75c1.8 1.8 2.9 4.37 2.9 7.25c0 2.88-1.1 5.45-2.9 7.25M10 2.75C8.2 4.55 7.1 7.12 7.1 10c0 2.88 1.1 5.45 2.9 7.25" stroke="currentColor" stroke-width="1.25" stroke-linecap="round"/>
                </svg>
              </span>
              <select id="language-select" class="language-select"></select>
            </div>
            <button id="open-options" class="header-button" type="button">설정</button>
          </div>
        </div>
        <p id="subtitle" class="subtitle"></p>
        <div class="mode-row">
          <span id="mode-label" class="mode-label"></span>
          <span id="mode-badge" class="mode-badge"></span>
        </div>
      </header>

      <section class="status-card">
        <div id="status-label" class="status-label"></div>
        <button id="save-button" class="primary-button" type="button">현재 글 저장</button>
        <button id="cloud-link-button" class="secondary-button hidden" type="button">Cloud 연결</button>
        <button id="retry-button" class="secondary-button hidden" type="button">다시 시도</button>
      </section>

      <section class="recent-card">
        <div class="card-head">
          <h2 id="recent-title">최근 저장</h2>
          <div class="card-head-actions">
            <button id="open-cloud-button" class="inline-link hidden" type="button">원격 열기</button>
            <button id="clear-recents" class="clear-button hidden" type="button">전체 삭제</button>
          </div>
        </div>
        <ul id="recent-list" class="recent-list">
          <li class="empty"></li>
        </ul>
      </section>

      <section class="promo-slot">
        <div class="promo-slot-card">
          <p id="promo-slot-title" class="promo-slot-title">광고 슬롯</p>
          <p id="promo-slot-description" class="promo-slot-description">향후 광고 영역</p>
        </div>
      </section>
    </main>

    <script type="module" src="./popup.js"></script>
  </body>
</html>
