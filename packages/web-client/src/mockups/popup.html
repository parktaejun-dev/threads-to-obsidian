<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Popup Preview</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <article class="frame popup">
      <header class="bar">
        <div>
          <p class="copy" style="margin:0;font-size:11px;letter-spacing:0.16em;text-transform:uppercase;">SS Threads</p>
          <h1 class="headline">Save Current Post</h1>
        </div>
        <div class="bar-actions">
          <div class="language-switch">
            <span class="language-option active">English</span>
            <span class="language-option">한국어</span>
          </div>
          <button class="icon-button" type="button">Settings</button>
        </div>
      </header>
      <div class="content">
        <p class="copy">Ready. Press to save directly to your connected Obsidian folder.</p>
        <div class="panel">
          <div class="status-box">Connected vault detected. Free save flow is ready.</div>
          <div class="button">Save Current Post</div>
        </div>
        <div class="panel">
          <p class="headline" style="font-size:16px;">Recent Saves</p>
          <div class="status-box">
            @designwriter · 2026-03-17 14:32<br />
            Free still handles the save itself. Pro only changes organization rules.
          </div>
        </div>
      </div>
    </article>
  </body>
</html>
