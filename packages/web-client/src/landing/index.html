<!doctype html>
<html lang="__INITIAL_LOCALE__">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>__SITE_TITLE__</title>
    <meta name="description" content="__SITE_DESCRIPTION__" />
    <meta name="theme-color" content="#111827" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css"
    />
    <link rel="icon" type="image/png" href="/assets/icons/icon-32.png" />
    <link rel="apple-touch-icon" href="/assets/icons/icon-128.png" />
    <link rel="canonical" href="__SITE_URL__/" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="__SITE_TITLE__" />
    <meta property="og:description" content="__SITE_DESCRIPTION__" />
    <meta property="og:url" content="__SITE_URL__/" />
    <link rel="stylesheet" href="/landing/styles.css" />
  </head>
  <body
    data-site-host="__SITE_HOST__"
    data-site-url="__SITE_URL__"
    data-initial-locale="__INITIAL_LOCALE__"
  >
    <div class="page">
      <header class="topbar">
        <a class="brand-link" href="/" aria-label="ss-threads home">
          <span class="brand-icon" aria-hidden="true">
            <img src="/assets/icons/icon-32.png" alt="" />
          </span>
          <span class="brand-copy">
            <strong class="brand-name" id="brand-name"><span class="brand-accent">ss</span>-threads</strong>
            <span class="brand-mark">__SITE_HOST__</span>
          </span>
        </a>

        <div class="topbar-actions">
          <div class="web-lang-switch" aria-label="Language switcher">
            <select class="web-lang-select" data-web-lang-select aria-label="Select language">
              <option value="ko">한국어</option>
              <option value="en">English</option>
              <option value="ja">日本語</option>
              <option value="pt-BR">Português (Brasil)</option>
              <option value="es">Español</option>
              <option value="zh-TW">繁體中文</option>
              <option value="vi">Tiếng Việt</option>
            </select>
          </div>
          <a id="topbar-primary-cta" class="topbar-link topbar-link-strong" href="/checkout" data-i18n="primaryCta">Plus 구매</a>
        </div>
      </header>

      <main>
        <section class="hero">
          <div class="hero-copy">
            <p id="hero-eyebrow" class="eyebrow" data-i18n="heroEyebrow">Save&Store</p>
            <h1 id="headline">
              <span class="headline-row">Extension on PC. @Mentions on mobile.</span>
              <span class="headline-row">Save&Sync, ss-threads</span>
            </h1>
            <p id="subheadline" class="lead"></p>

            <div class="hero-actions">
              <a id="hero-mobile-cta" class="primary-cta" href="/scrapbook" data-i18n="productBCta">멘션 scrapbook</a>
              <a id="hero-desktop-cta" class="secondary-cta" href="" data-i18n="productACta">extension 설치</a>
            </div>
          </div>
        </section>

        <section id="products" class="section">
          <article id="mobile-flow" class="flow-row">
            <div class="flow-copy">
              <p id="product-b-tag" class="product-tag" data-i18n="productBTag">Mobile</p>
              <h3 id="product-b-title" data-i18n="productBTitle"><span class="brand-accent">ss</span>-threads</h3>
              <p id="product-b-desc" class="flow-desc" data-i18n="productBDesc"></p>
            </div>
          </article>

          <article id="desktop-flow" class="flow-row">
            <div class="flow-copy">
              <p id="product-a-tag" class="product-tag" data-i18n="productATag">PC</p>
              <h3 id="product-a-title" data-i18n="productATitle">Save&Sync</h3>
              <p id="product-a-desc" class="flow-desc" data-i18n="productADesc"></p>
            </div>
          </article>
        </section>

      </main>

      <footer class="site-footer">
        <span class="footer-domain">__SITE_HOST__</span>
        <a
          id="footer-extension-link"
          href=""
          target="_blank"
          rel="noreferrer"
          data-i18n="productACta"
        >extension 설치</a>
      </footer>
    </div>

    <script type="module" src="/assets/landing.js"></script>
  </body>
</html>
