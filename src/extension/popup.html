<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Threads to Obsidian</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="shell">
      <header class="header">
        <div class="header-top">
          <div>
            <p class="eyebrow">Threads to Obsidian</p>
            <h1 id="header-title">현재 글 저장</h1>
          </div>
          <div style="display:flex;gap:6px;align-items:center">
            <button id="lang-toggle" class="header-button" type="button">EN</button>
            <button id="open-options" class="header-button" type="button">설정</button>
          </div>
        </div>
        <p id="subtitle" class="subtitle"></p>
      </header>

      <section class="status-card">
        <div id="status-label" class="status-label"></div>
        <button id="save-button" class="primary-button" type="button">현재 글 저장</button>
        <button id="retry-button" class="secondary-button hidden" type="button">다시 시도</button>
      </section>

      <section class="recent-card">
        <div class="card-head">
          <h2 id="recent-title">최근 저장</h2>
          <button id="clear-recents" class="clear-button hidden" type="button">전체 삭제</button>
        </div>
        <ul id="recent-list" class="recent-list">
          <li class="empty"></li>
        </ul>
      </section>
    </main>

    <script type="module" src="./popup.js"></script>
  </body>
</html>
